<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />

    <link rel="stylesheet" href="../assets/css/adminDashboard.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
    <script type="module" src="../js/adminDashboard.js" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <h2>Admin Dashboard</h2>

                <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
                    <input
                        type="text"
                        id="searchBar"
                        placeholder="Search doctors..."
                        style="padding:10px; border-radius:8px; border:1px solid #ccc; font-size:15px; width:300px;"
                    />
                    <button id="addDoctorBtn" style="width:auto; padding:10px 20px;">+ Add Doctor</button>
                </div>

                <div class="filters">
                    <select id="timeFilter">
                        <option value="">All Times</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>

                    <select id="specialtyFilter">
                        <option value="">All Specialties</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dentist">Dentist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="Gynecologist">Gynecologist</option>
                        <option value="Psychiatrist">Psychiatrist</option>
                        <option value="Ophthalmologist">Ophthalmologist</option>
                        <option value="ENT">ENT Specialist</option>
                        <option value="Urologist">Urologist</option>
                        <option value="Oncologist">Oncologist</option>
                        <option value="Gastroenterologist">Gastroenterologist</option>
                        <option value="General">General Physician</option>
                    </select>
                </div>

                <div id="content"></div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal" style="display:none;">
        <div class="modal-content">
            <button id="closeModal" type="button">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>
</body>
</html>
