<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Management System</title>
    <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <main>
        <div class="container">
            <div class="wrapper">
                <div id="header"></div>

                <main class="main-content">
                    <h2 id="roleHeading">Select Your <span class="role-text">Role</span></h2>

                    <div id="roleButtons" class="role-buttons">
                        <button id="adminBtn">Admin</button>
                        <button id="patientBtn">Patient</button>
                        <button id="doctorBtn">Doctor</button>
                    </div>
                </main>

                <div id="footer"></div>
            </div>
        </div>

        <div id="modal" class="modal" style="display: none;">
            <div class="modal-content">
                <button id="closeModal" type="button">&times;</button>
                <div id="modal-body"></div>
            </div>
        </div>
    </main>

    <script type="module" src="./js/services/index.js" defer></script>
</body>
</html>
